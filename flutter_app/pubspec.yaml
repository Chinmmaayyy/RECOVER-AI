name: recoverai
description: RecoverAI - Intelligent Post-Discharge Care Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  speech_to_text: ^6.6.0
  sqflite: ^2.3.2
  flutter_secure_storage: ^9.0.0
  url_launcher: ^6.2.5
  supabase_flutter: ^2.8.0
  intl: ^0.19.0
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

dependency_overrides:
  app_links: ^6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
